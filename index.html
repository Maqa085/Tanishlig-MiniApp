<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElanımAz - Professional Elan Saytı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sənin verdiyin Uiverse.io CSS kodları */
        .button {
            --black-700: hsla(0 0% 12% / 1);
            --border_radius: 9999px;
            --transtion: 0.3s ease-in-out;
            --offset: 2px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transform-origin: center;
            padding: 0.8rem 1.5rem; /* Bir az optimizasiya etdim */
            background-color: transparent;
            border: none;
            border-radius: var(--border_radius);
            transform: scale(calc(1 + (var(--active, 0) * 0.1)));
            transition: transform var(--transtion);
        }
        .button::before {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; background-color: var(--black-700);
            border-radius: var(--border_radius);
            box-shadow: inset 0 0.5px hsl(0, 0%, 100%), inset 0 -1px 2px 0 hsl(0, 0%, 0%),
                0px 4px 10px -4px hsla(0 0% 0% / calc(1 - var(--active, 0))),
                0 0 0 calc(var(--active, 0) * 0.375rem) hsl(260 97% 50% / 0.75);
            transition: all var(--transtion); z-index: 0;
        }
        .button::after {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; background-color: hsla(260 97% 61% / 0.75);
            background-image: radial-gradient(at 51% 89%, hsla(266, 45%, 74%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(266, 36%, 60%, 1) 0px, transparent 50%),
                radial-gradient(at 22% 91%, hsla(266, 36%, 60%, 1) 0px, transparent 50%);
            background-position: top; opacity: var(--active, 0); border-radius: var(--border_radius);
            transition: opacity var(--transtion); z-index: 2;
        }
        .button:is(:hover, :focus-visible) { --active: 1; }
        .button:active { transform: scale(1); }
        .button .dots_border {
            --size_border: calc(100% + 2px); overflow: hidden; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: var(--size_border); height: var(--size_border); background-color: transparent;
            border-radius: var(--border_radius); z-index: -10;
        }
        .button .dots_border::before {
            content: ""; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            transform-origin: left; transform: rotate(0deg); width: 100%; height: 2rem;
            background-color: white; mask: linear-gradient(transparent 0%, white 120%);
            animation: rotate 2s linear infinite;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .button .text_button {
            position: relative; z-index: 10;
            background-image: linear-gradient(90deg, hsla(0 0% 100% / 1) 0%, hsla(0 0% 100% / var(--active, 0)) 120%);
            background-clip: text; font-size: 1rem; color: transparent; font-weight: 600;
        }

        /* Səhifə keçidləri üçün gizlətmə/göstərmə */
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="py-8 text-center">
        <h1 class="text-4xl font-black text-gray-800 tracking-widest uppercase">
            Elanım<span class="text-indigo-600">Az</span>
        </h1>
    </header>

    <nav class="flex flex-wrap justify-center gap-4 px-4 mb-10">
        <button class="button" onclick="showPage('elanlar')">
            <span class="dots_border"></span>
            <span class="text_button">Elanlar</span>
        </button>

        <button class="button" onclick="showPage('chat')">
            <span class="dots_border"></span>
            <span class="text_button">Chat</span>
        </button>

        <button class="button" onclick="showPage('profil')">
            <span class="dots_border"></span>
            <span class="text_button">Profilim</span>
        </button>
    </nav>

    <main class="max-w-4xl mx-auto px-6">
        
        <div id="elanlar" class="page active">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-200">
                <h2 class="text-2xl font-bold mb-4">Son Elanlar</h2>
                <p class="text-gray-500 italic">Bura elanlar Firebase-dən gələcək...</p>
            </div>
        </div>

        <div id="chat" class="page">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-200">
                <h2 class="text-2xl font-bold mb-4">Mesajlar</h2>
                <div class="h-40 flex items-center justify-center border-2 border-dashed border-gray-200 rounded-xl">
                    <p class="text-gray-400">Hələlik mesaj yoxdur.</p>
                </div>
            </div>
        </div>

        <div id="profil" class="page">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-200">
                <h2 class="text-2xl font-bold mb-4">Mənim Profilim</h2>
                <div class="flex items-center space-x-4">
                    <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold">EA</div>
                    <div>
                        <p class="font-semibold text-lg">İstifadəçi Adı</p>
                        <p class="text-sm text-gray-400">Qeydiyyat: 2026</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Səhifə keçid funksiyası
        function showPage(pageId) {
            // Bütün səhifələri gizlət
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active'));

            // Seçilən səhifəni göstər
            document.getElementById(pageId).classList.add('active');
        }
    </script>

</body>
                </html>
